<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheCvBuilder — Hors ligne</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 400px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 18px;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: #c9a84c;
            font-size: 1.6rem;
            margin-bottom: 0.8rem;
        }

        p {
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .btn {
            background: linear-gradient(135deg, #c9a84c, #e8c97a);
            border: none;
            color: #0f0f1a;
            padding: 14px 36px;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4);
            }

        .status {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/web-app-manifest-192x192.png" alt="TheCvBuilder" class="logo">
        <div class="icon">📶</div>
        <h1>Vous êtes hors ligne</h1>
        <p>
            Vérifiez votre connexion internet et réessayez.<br>
            Vos données sont sauvegardées et disponibles dès que vous serez reconnecté.
        </p>
        <button class="btn" onclick="window.location.reload()">
            🔄 Réessayer
        </button>
        <p class="status">TheCvBuilder — Votre CV professionnel optimisé</p>
    </div>
</body>
</html>
